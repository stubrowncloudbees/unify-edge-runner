apiVersion: automation.cloudbees.io/v1alpha1
kind: Workflow
name: publish-chart

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v2

      - name: Package and publish to GitHub Pages
        uses: docker://alpine/helm:3.14.0
        run: |
          apk add --no-cache git

          # Package the chart
          mkdir -p .chart-output
          helm package charts/unify-edge-runner --destination .chart-output/

          # Configure git
          git config user.email "ci@cloudbees.com"
          git config user.name "CloudBees CI"

          # Stash the packaged chart before switching branches
          mkdir -p /tmp/chart-publish
          cp .chart-output/*.tgz /tmp/chart-publish/

          # Switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Copy in the new chart package and regenerate index
          cp /tmp/chart-publish/*.tgz .
          helm repo index . --url https://stubrowncloudbees.github.io/unify-edge-runner

          # Commit and push
          git add index.yaml *.tgz
          git commit -m "Publish $(ls /tmp/chart-publish/*.tgz | xargs basename)"
          git push origin gh-pages

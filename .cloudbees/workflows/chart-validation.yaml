apiVersion: automation.cloudbees.io/v1alpha1
kind: Workflow
name: chart-validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-template:
    steps:
      - name: Checkout
        uses: cloudbees-io/checkout@v2

      - name: Helm lint
        uses: docker://alpine/helm:3.14.0
        run: |
          helm lint charts/unify-edge-runner \
            --values charts/unify-edge-runner/ci/default-values.yaml

      - name: Helm template and verify
        uses: docker://alpine/helm:3.14.0
        run: |
          OUTPUT=$(helm template test-release charts/unify-edge-runner \
            --values charts/unify-edge-runner/ci/default-values.yaml)

          echo "$OUTPUT" | grep -q "kind: StatefulSet"    && echo "PASS: StatefulSet present"
          echo "$OUTPUT" | grep -q "name: register"       && echo "PASS: register init container present"
          echo "$OUTPUT" | grep -q "name: tools-init"     && echo "PASS: tools init container present"
          echo "$OUTPUT" | grep -q "volumeClaimTemplates" && echo "PASS: volumeClaimTemplates present"
          echo "$OUTPUT" | grep -q "test-kubeconfig"      && echo "PASS: kubeconfig secret mounted"
          echo "$OUTPUT" | grep -q "test-ssh"             && echo "PASS: ssh secret mounted"

{{- if .Values.reconciler.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "edge-runner.fullname" . }}-reconciler
  labels:
    {{- include "edge-runner.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "edge-runner.fullname" . }}-reconciler
  labels:
    {{- include "edge-runner.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    resourceNames: ["{{ include "edge-runner.fullname" . }}"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "edge-runner.fullname" . }}-reconciler
  labels:
    {{- include "edge-runner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "edge-runner.fullname" . }}-reconciler
subjects:
  - kind: ServiceAccount
    name: {{ include "edge-runner.fullname" . }}-reconciler
    namespace: {{ .Release.Namespace }}
{{- end }}

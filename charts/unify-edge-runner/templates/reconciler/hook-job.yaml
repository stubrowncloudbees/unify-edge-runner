{{- if and .Values.reconciler.enabled .Values.reconciler.hookJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "edge-runner.fullname" . }}-reconciler-hook
  labels:
    {{- include "edge-runner.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": {{ .Values.reconciler.hookJob.hookDeletePolicy | quote }}
    "helm.sh/hook-weight": "0"
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "edge-runner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: reconciler
        cloudbees.io/architecture: v2
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "edge-runner.fullname" . }}-reconciler
      containers:
        - name: reconciler
          image: "{{ .Values.reconciler.image.repository }}:{{ .Values.reconciler.image.tag }}"
          imagePullPolicy: {{ .Values.reconciler.image.pullPolicy }}
          command:
            - /bin/sh
            - /scripts/reconcile.sh
          env:
            {{- include "edge-runner.reconcilerEnv" . | nindent 12 }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: {{ include "edge-runner.fullname" . }}-reconciler
            defaultMode: 0755
{{- end }}

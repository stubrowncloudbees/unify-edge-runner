# ---------------------------------------------------------------------------
# unify-edge-runner Helm chart — values.yaml
#
# Sensitive values (PAT, kubeconfig, SSH keys) are NEVER stored here.
# All secrets must be pre-created as Kubernetes Secrets before installing
# this chart. The chart references them by name only.
#
# See README.md for the exact kubectl commands to create each secret.
# ---------------------------------------------------------------------------

# Number of runner replicas.
# Each pod registers with Unify as a separate named runner.
# Pods are named <release>-0, <release>-1, etc.
replicaCount: 1

# ---------------------------------------------------------------------------
# Unify API
# ---------------------------------------------------------------------------
unify:
  # CloudBees Unify API base URL.
  apiUrl: "https://api.cloudbees.io"

  # CloudBees Unify organisation ID.
  # Find it in the Unify UI under Organisation Settings.
  orgId: "YOUR-ORG-ID-HERE"

# ---------------------------------------------------------------------------
# Runner configuration
# ---------------------------------------------------------------------------
runner:
  # Runner name prefix. Each replica registers as <name>-<index> in Unify.
  # Example: name "k8s-home" with 3 replicas registers as k8s-home-0, k8s-home-1, k8s-home-2.
  # Choose a name that is meaningful and unique within your Unify organisation.
  name: "edge-runner"

  # Runner labels (comma-separated).
  # Jobs are dispatched to runners that match ALL required labels.
  # Example: "self-hosted,k8s,arm64"
  labels: "self-hosted"

  # Working directory inside the container.
  # The runner binary, config, and workspace live here.
  # This path is backed by the PVC for persistence across restarts.
  workingDir: /opt/runner

# ---------------------------------------------------------------------------
# PAT secret reference
# ---------------------------------------------------------------------------
# The chart reads the PAT from a pre-existing Kubernetes Secret.
# Create the secret before installing this chart:
#
#   kubectl create secret generic edge-runner-pat \
#     --namespace <namespace> \
#     --from-literal=pat='<YOUR_PAT>'
#
# patSecret.name is REQUIRED. The chart will fail to render if it is empty.
patSecret:
  name: ""   # REQUIRED — name of the pre-created Kubernetes Secret
  key: pat   # Key within the secret that holds the PAT value

# ---------------------------------------------------------------------------
# Runner image
# ---------------------------------------------------------------------------
# ubuntu:22.04 is used as a convenient base while a dedicated runner image
# is not yet available. All tooling is installed at container startup.
image:
  repository: ubuntu
  tag: "22.04"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Runner binary
# ---------------------------------------------------------------------------
# URL to download the CloudBees Unify edge runner binary.
# Set the correct architecture for your nodes (amd64 / arm64).
# Placeholder URL — replace with the correct download URL for your version.
binaryUrl: "https://downloads.example.com/cloudbees-runner/linux/amd64/cloudbees-runner"

# ---------------------------------------------------------------------------
# Kubeconfig secret reference (optional)
# ---------------------------------------------------------------------------
# Mount a kubeconfig into the runner so jobs can use kubectl and helm.
# Create the secret before enabling this option:
#
#   kubectl create secret generic edge-runner-kubeconfig \
#     --namespace <namespace> \
#     --from-file=config=/path/to/kubeconfig
#
# Set enabled: false if your jobs do not need cluster access.
kubeconfig:
  enabled: false
  secretName: ""   # REQUIRED if enabled — name of the pre-created Kubernetes Secret
  mountPath: /root/.kube/config

# ---------------------------------------------------------------------------
# SSH secret reference (optional)
# ---------------------------------------------------------------------------
# Mount SSH keys so jobs can clone from private Git repositories.
# Create the secret before enabling this option:
#
#   kubectl create secret generic edge-runner-ssh \
#     --namespace <namespace> \
#     --from-file=id_rsa=/path/to/private_key \
#     --from-file=known_hosts=/path/to/known_hosts
#
# Set enabled: false if your jobs do not need SSH-based Git access.
ssh:
  enabled: false
  secretName: ""   # REQUIRED if enabled — name of the pre-created Kubernetes Secret
  mountPath: /root/.ssh

# ---------------------------------------------------------------------------
# Tools init container (extension point)
# ---------------------------------------------------------------------------
# An optional init container that runs before the main runner container.
# Use this to inject additional tools into the shared /tools volume.
# The /tools directory is mounted into the main container at the same path.
#
# Set enabled: true and provide a script to install tools.
# The main container's PATH includes /tools/bin automatically.
#
# Example use cases:
#   - Inject a specific kubectl version
#   - Install cloud CLIs (aws, gcloud, az)
#   - Install language runtimes
toolsInit:
  enabled: false
  image: ubuntu:22.04
  script: |
    mkdir -p /tools/bin
    # Example: install a specific kubectl version
    # curl -sL -o /tools/bin/kubectl \
    #   "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
    # chmod +x /tools/bin/kubectl

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
# PVC per replica, used to persist runner registration config across restarts.
# Without this, the runner would re-register on every pod restart, creating
# stale runner entries in Unify.
storage:
  size: 1Gi
  # storageClass: ""  # Leave empty to use the cluster default StorageClass.
  # Uncomment and set if you need a specific StorageClass:
  # storageClass: "local-path"

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ---------------------------------------------------------------------------
# Pod scheduling
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Reconciler
# ---------------------------------------------------------------------------
# Detects and removes stale runner registrations in Unify after scale-down.
#
# Kubernetes is the source of truth — the reconciler reads the StatefulSet
# replica count directly and never duplicates it here.
#
# Two mechanisms:
#   - Job (Helm hook): runs automatically on every helm install / upgrade
#   - CronJob: runs periodically to catch drift
#
# Mode:
#   audit   — log stale runners, no deletion
#   cleanup — delete stale runners from Unify and remove their PVCs (default)
#
# The reconciler only deletes runners that:
#   - match the runner.name prefix
#   - are NOT in the expected set (derived from StatefulSet replicas)
#
# It will never touch runners from other deployments or other releases.
reconciler:
  enabled: true

  # audit or cleanup (default).
  # audit: log stale runners, no deletion.
  # cleanup: delete stale runners from Unify and remove their PVCs.
  mode: cleanup

  image:
    repository: alpine
    tag: "3.20"
    pullPolicy: IfNotPresent

  # Helm post-install/post-upgrade hook Job.
  # Runs automatically after every helm install or helm upgrade.
  hookJob:
    enabled: true
    # before-hook-creation cleans up any prior failed run before launching.
    # hook-succeeded removes the Job on clean completion.
    hookDeletePolicy: before-hook-creation,hook-succeeded

  # Periodic CronJob for drift detection and ongoing reconciliation.
  # Manual trigger: kubectl create job reconcile-now --from=cronjob/<name> -n <ns>
  cronJob:
    enabled: true
    schedule: "*/15 * * * *"

# ---------------------------------------------------------------------------
# Service account
# ---------------------------------------------------------------------------
serviceAccount:
  create: false
  name: ""

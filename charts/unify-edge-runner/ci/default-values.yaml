# CI test values used by helm lint and helm template in the validation workflow.
# These are NOT production values — placeholder names only, no real secrets.

replicaCount: 1

unify:
  apiUrl: "https://api.cloudbees.io"
  orgId: "00000000-0000-0000-0000-000000000000"

runner:
  name: "ci-test-runner"
  labels: "self-hosted,ci-test"
  workingDir: /opt/runner

# patSecret.name must be non-empty to satisfy the required guard in the template.
# In real deployments this secret must be pre-created before installing the chart.
patSecret:
  name: "ci-test-pat-secret"
  key: pat

kubeconfig:
  enabled: true
  secretName: "ci-test-kubeconfig"

ssh:
  enabled: true
  secretName: "ci-test-ssh"

toolsInit:
  enabled: true
  image: ubuntu:22.04
  script: |
    mkdir -p /tools/bin
    echo "tools init placeholder"

binaryUrl: "https://downloads.example.com/cloudbees-runner/linux/{arch}/cloudbees-runner"

storage:
  size: 1Gi

reconciler:
  enabled: true
  mode: audit
  image:
    repository: alpine
    tag: "3.20"
    pullPolicy: IfNotPresent
  hookJob:
    enabled: true
    hookDeletePolicy: before-hook-creation,hook-succeeded
  cronJob:
    enabled: true
    schedule: "*/15 * * * *"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
